services:
  - type: web
    name: school-website
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".render.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.render.com"
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: school-db
    plan: free
